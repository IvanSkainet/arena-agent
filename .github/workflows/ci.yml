name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # v4.61.0: 3.10 .. 3.14, plus Windows + Linux runners. 3.14
        # is the user's primary runtime; we want any 3.14-specific
        # breakage caught here before it lands on their box. The
        # Windows matrix entry exercises code paths that touch
        # %TEMP%, schtasks, and msedge.exe -- none of which are
        # reachable on a Linux runner.
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e ".[dev]"

      - name: Run tests
        # --cov settings come from pyproject.toml. Coverage gate
        # is enforced here on every matrix cell, so a PR that
        # drops coverage on Windows-specific code can't sneak
        # through just because Linux coverage is still 80%.
        # The gate is set explicitly in CI rather than baked
        # into addopts so a developer's local `pytest -q` does
        # not break when they add an experimental module.
        run: pytest -q --cov-fail-under=70

      - name: Upload coverage report
        # All matrix cells overwrite the same artifact name; we
        # only need one (the last one uploaded is the one that
        # stays). Using if: always() so a partial failure still
        # surfaces the coverage delta to the PR.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 14

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      # Blocking: critical correctness rules that catch real bugs
      # (undefined names, redefinitions). These currently pass and must
      # keep passing.
      - name: Critical lint (blocking)
        run: ruff check . --select F821,F811

      # Informational: the full rule set. The codebase is large and
      # organically grown, so the rest is reported but not enforced yet.
      # Tighten over time as modules get cleaned up and split out.
      - name: Full lint (informational)
        run: ruff check . --statistics || true

  typecheck:
    # v4.61.0: narrow mypy --strict pass on the auto-update and
    # service-restart modules. The wider arena/ is still under
    # gradual typing; expand [[tool.mypy.overrides]] in
    # pyproject.toml as more code gets type annotations.
    name: Type check (mypy strict, narrow)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install mypy
        run: pip install "mypy>=1.10"

      - name: Strict mypy on the auto-update + restart modules
        # Modules listed in pyproject.toml [tool.mypy.overrides].
        # If a new module is added there, this command picks it up
        # automatically via `$(grep ...)` discovery.
        run: |
          MODULES=$(python -c "
          import tomllib, re
          cfg = tomllib.loads(open('pyproject.toml').read())
          mods = []
          for ov in cfg.get('tool', {}).get('mypy', {}).get('overrides', []):
              for m in ov.get('module', []):
                  mods.append(m.strip())
          print(' '.join(mods))
          ")
          echo "Type-checking: $MODULES"
          mypy --strict $MODULES
