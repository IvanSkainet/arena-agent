name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# v4.61.1: explicit permissions for all jobs. GitHub
# Actions' default token pool can return 'unable to select next
# github token from pool' on forks / restricted repos when
# GITHUB_TOKEN is requested without an explicit permissions
# block. contents: read is enough for the test + lint +
# actionlint jobs (none of them push back to the repo).
permissions:
  contents: read

jobs:
  # ----------------------------------------------------------------
  # v4.62.0: actionlint catches workflow syntax errors before
  # they reach the runner. Catches: typos in `if:` / `uses:`,
  # wrong event names, matrix typo, missing permissions, etc.
  # ----------------------------------------------------------------
  actionlint:
    name: Workflow lint (actionlint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Run actionlint
        uses: rhysd/actionlint@914e7df21a07ef503a81201c76d2b11c789d3fca # v1.7.12
        with:
          # actionlint ships its own binary; we just point it at
          # the workflow directory. The README badge URL we ship
          # does not exist as a real workflow file, so we skip
          # the badge reference check (actionlint has a separate
          # flag for that).
          ignore: 'workflow-call-usage'

  # ----------------------------------------------------------------
  # Test matrix: 5 Python versions on ubuntu-latest.
  # Windows runner deferred to v4.62.x once platform-specific
  # test failures are fixed or skipif'd.
  # ----------------------------------------------------------------
  test:
    name: Tests (Python ${{ matrix.python-version }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.0.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install hypothesis pytest-cov

      - name: Run tests
        # --cov settings come from pyproject.toml. Coverage gate
        # is enforced here on every matrix cell.
        # v4.62.0: also pass --strict-markers so an unknown
        # marker in a test file trips the build instead of
        # passing silently. --junitxml produces machine-readable
        # results for the JUnit upload step below.
        run: |
          pytest -q --cov-fail-under=50 \
          --strict-markers \
          --junitxml=test-results-${{ matrix.python-version }}.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.0.0
        with:
          name: test-results-${{ matrix.python-version }}
          path: test-results-${{ matrix.python-version }}.xml
          retention-days: 14

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.0.0
        with:
          name: coverage-xml-${{ matrix.python-version }}
          path: coverage.xml
          retention-days: 14

  # ----------------------------------------------------------------
  # v4.65.0: coverage diff guard. Runs after the test matrix so
  # it can download one of the coverage.xml artifacts. The guard
  # compares the line-rate in coverage.xml against
  # docs/coverage-baseline.json and fails the build if coverage
  # dropped more than 1 percentage point since the last release.
  #
  # Why a separate job: a coverage drop is a different kind of
  # failure than a test failure, and the GitHub UI makes a
  # dedicated "Coverage diff" red X easier to triage than a
  # buried assertion in a 5-cell matrix.
  # ----------------------------------------------------------------
  coverage-diff:
    name: Coverage diff (vs ${{ github.event.repository.default_branch }})
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.0.0
        with:
          python-version: "3.12"

      - name: Download coverage.xml from a 3.12 cell
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: coverage-xml-3.12
          path: .

      - name: Run coverage diff guard
        # Exit 0 = within tolerance, exit 1 = dropped too much,
        # exit 2 = missing baseline (first run only). The script's
        # stdout is the human-readable explanation; the exit code
        # is what the job reads.
        run: |
          python scripts/coverage_diff.py \
            --xml coverage.xml \
            --baseline docs/coverage-baseline.json \
            --max-drop 1.0

  # ----------------------------------------------------------------
  # Lint: ruff F821/F811 are blocking. Full rule set is
  # informational.
  # ----------------------------------------------------------------
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.0.0
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      # Blocking: critical correctness rules that catch real bugs
      # (undefined names, redefinitions). These currently pass and
      # must keep passing.
      - name: Critical lint (blocking)
        run: ruff check . --select F821,F811

      # Informational: the full rule set. The codebase is large
      # and organically grown, so the rest is reported but not
      # enforced yet. Tighten over time as modules get cleaned up.
      - name: Full lint (informational)
        run: ruff check . --statistics || true

  # ----------------------------------------------------------------
  # v4.62.0: contract test that the MCP tool surface matches the
  # checked-in snapshot. Catches: accidental rename of a
  # handle_xxx function, deletion of a tool name, silent handler
  # rot. This runs as a separate job so a contract failure shows
  # up as its own red X in the Actions UI.
  # ----------------------------------------------------------------
  contract:
    name: MCP contract test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.0.0
        with:
          python-version: "3.12"

      - name: Install pytest
        run: pip install pytest

      - name: Run MCP contract test
        # The test re-scans arena/mcp/tool_*.py and compares
        # against tests/_mcp_contract_snapshot.json. A diff
        # means a tool was added/removed/renamed without
        # running scripts/refresh_mcp_contract_snapshot.py.
        run: pytest -q -o addopts="-q --strict-markers" tests/test_mcp_tool_contracts.py

      - name: Run property-based spec-kit parser test
        run: pip install hypothesis && pytest -q -o addopts="-q --strict-markers" tests/test_spec_kit_parser_property.py
