name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # v4.61.0: 3.10 .. 3.14, Linux only. Windows runner
        # deferred to a later release once platform-specific
        # test failures (mission-schedule bash probe, cp1251
        # decode, sound-device skip, sqlite file locking) are
        # either fixed or skipped via pytest markers.
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install hypothesis pytest-cov mypy

      - name: Run tests
        # --cov settings come from pyproject.toml. Coverage gate
        # is enforced here on every matrix cell, so a PR that
        # drops coverage on Windows-specific code can't sneak
        # through just because Linux coverage is still 80%.
        # The gate is set explicitly in CI rather than baked
        # into addopts so a developer's local `pytest -q` does
        # not break when they add an experimental module.
        # v4.61.0 starts the gate at 50% (current coverage is
        # 50.21%) so the new test infrastructure (hypothesis +
        # contract tests) ships green. v4.62.x and later
        # releases should tighten this threshold as more tests
        # are added.
        run: pytest -q --cov-fail-under=50

      - name: Upload coverage report
        # All matrix cells overwrite the same artifact name; we
        # only need one (the last one uploaded is the one that
        # stays). Using if: always() so a partial failure still
        # surfaces the coverage delta to the PR.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 14

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      # Blocking: critical correctness rules that catch real bugs
      # (undefined names, redefinitions). These currently pass and must
      # keep passing.
      - name: Critical lint (blocking)
        run: ruff check . --select F821,F811

      # Informational: the full rule set. The codebase is large and
      # organically grown, so the rest is reported but not enforced yet.
      # Tighten over time as modules get cleaned up and split out.
      - name: Full lint (informational)
        run: ruff check . --statistics || true

  typecheck:
    # v4.61.0: informational mypy pass on the auto-update and
    # service-restart modules. We do NOT use --strict yet because
    # most of the listed modules do not yet have full annotations
    # and strict mode would be a permanently-red CI. Tighten
    # module-by-module as more code gets annotations; the override
    # list in pyproject.toml grows with each release.
    name: Type check (mypy, informational)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install mypy
        run: pip install "mypy>=1.10"

      - name: mypy on the auto-update + restart modules
        run: |
          MODULES=$(python -c "
          import tomllib
          cfg = tomllib.loads(open('pyproject.toml').read())
          mods = []
          for ov in cfg.get('tool', {}).get('mypy', {}).get('overrides', []):
              for m in ov.get('module', []):
                  mods.append(m.strip())
          print(' '.join(mods))
          ")
          echo "Type-checking: $MODULES"
          mypy --ignore-missing-imports $MODULES
