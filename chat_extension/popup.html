<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Arena Chat Bridge</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main>
    <h1>Arena Chat Bridge</h1>
    <section>
      <label>Bridge URL</label>
      <input id="bridgeUrl" placeholder="http://127.0.0.1:8765">
      <label>Bridge Token</label>
      <input id="bridgeToken" type="password" placeholder="Bearer token">
      <fieldset>
        <legend>Execution modes</legend>
        <label><input id="autoPreview" type="checkbox"> Auto preview detected blocks</label>
        <label><input id="autoExecuteSafe" type="checkbox"> Auto execute safe calls on trusted sites</label>
        <label><input id="autoInsertResult" type="checkbox"> Auto insert successful results</label>
        <label><input id="autoSubmitResult" type="checkbox"> Auto submit after insert</label>
      </fieldset>
      <div class="row">
        <button id="saveBtn">Save</button>
        <button id="testBtn">Test</button>
        <button id="policyBtn">Policies</button>
        <button id="arenaInstructionsBtn">Copy Arena Instructions</button>
        <button id="jsonlInstructionsBtn">Copy JSONL Instructions</button>
        <button id="panelBtn">Panel</button>
        <button id="scanBtn">Scan Page</button>
        <button id="pageControlsBtn">Clear Page Controls</button>
        <button id="clearBtn">Clear History</button>
      </div>
      <pre id="statusBox">Loading...</pre>
    </section>
    <section>
      <h2>Recent executions</h2>
      <pre id="historyBox">No history yet.</pre>
    </section>
  </main>
  <script src="settings.js"></script>
  <script src="popup.js"></script>
</body>
</html>
