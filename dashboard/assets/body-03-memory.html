<div class="tab" id="tab-memory">
<h1>Memory</h1>
<div class="card">
<h2>Add Fact</h2>
<div class="row"><input id="memKey" placeholder="Key" style="flex:1"><input id="memValue" placeholder="Value" style="flex:2"><input id="memTags" placeholder="Tags (comma)" style="flex:1"><button class="success" onclick="addMemory()">Add</button></div>
</div>
<div class="card">
<div class="row"><input id="memSearch" placeholder="Search facts..." style="flex:1"><button onclick="loadMemory()">Search</button>
<button class="info" onclick="memoryDigest()">Digest</button>
<button class="warning" onclick="recallFromMemory()">Recall</button></div>
</div>
<div id="memoryDigestPanel" class="card" style="display:none"></div>
<table><thead><tr><th>Key</th><th>Value</th><th>Tags</th><th>Time</th><th>Actions</th></tr></thead><tbody id="memoryTable"></tbody></table>
</div>
