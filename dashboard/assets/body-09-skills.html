<div class="tab" id="tab-skills">
<style>
  /* Skills tab -- scoped to #tab-skills (v4.0.x lesson). */
  #tab-skills{
    --sk-tint-green:#00d67222;
    --sk-tint-blue:#4fc3f733;
    --sk-tint-gray:#88888833;
  }
  #tab-skills h2{display:flex;align-items:center;gap:8px;margin:0 0 8px 0;font-size:14px;letter-spacing:0.02em;text-transform:uppercase;color:var(--text2)}
  #tab-skills h2 .section-badge{font-size:10px;font-weight:600;padding:2px 6px;border-radius:8px;background:var(--sk-tint-gray);color:var(--text2);text-transform:none;letter-spacing:0}
  #tab-skills .sk-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  #tab-skills .sk-row input{flex:1;min-width:160px}
  #tab-skills .sk-row input.sk-wide{flex:2}
  #tab-skills .sk-toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:8px}
  #tab-skills .sk-table{width:100%}
  #tab-skills .sk-table th.col-actions{width:180px}
  #tab-skills .sk-table tr:hover td{background:var(--bg3)}
  #tab-skills .sk-empty{padding:24px;text-align:center;color:var(--text2)}
  #tab-skills .card{margin-bottom:10px}
</style>
<h1>Skills</h1>

<div class="card">
  <h2>Install Third-Party Skill <span class="section-badge">git · zip</span></h2>
  <div class="sk-row">
    <input id="installSkillName" placeholder="Skill name (e.g. test-skill)">
    <input id="installSkillUrl" class="sk-wide" placeholder="Git or ZIP URL">
    <button class="success" onclick="installSkill()">Install</button>
  </div>
</div>

<div class="sk-toolbar">
  <button onclick="loadSkills()">Reload</button>
</div>

<table class="sk-table">
  <thead><tr><th>Name</th><th>Description</th><th class="col-actions">Actions</th></tr></thead>
  <tbody id="skillsTable">
    <tr><td colspan="3" class="sk-empty">Loading… (or press Reload)</td></tr>
  </tbody>
</table>

<div id="skillDetail" class="detail-panel"></div>

<div id="skillOutput" class="card" style="display:none;margin-top:12px">
  <h2>Skill Output</h2>
  <div class="output" id="skillOutputText"></div>
</div>
</div>
