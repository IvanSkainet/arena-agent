<div class="tab" id="tab-settings">
<h1>Settings</h1>
<div class="card">
<h2>Bridge Info</h2>
<p>Version: <strong id="setVersion">{{VERSION}}</strong></p>
<p>Host: <strong>{{HOST}}</strong></p>
<p>Service mode: <span id="setServiceMode" class="badge gray">checking...</span></p>
<p>Token: <code id="setToken">{{TOKEN}}</code> <button class="copy-btn sm" onclick="copyToClipboard('{{TOKEN}}')">Copy</button></p>
</div>
<div class="card">
<h2>Bridge Metrics</h2>
<div class="metric-row">
<div class="metric-item"><div class="metric-val info" id="setUptime">--</div><div class="metric-label">Uptime</div></div>
<div class="metric-item"><div class="metric-val warn" id="setRequests">0</div><div class="metric-label">Total Requests</div></div>
<div class="metric-item"><div class="metric-val" id="setErrors">0</div><div class="metric-label">Errors</div></div>
</div>
</div>
<div class="card">
<h2>Environment</h2>
<div id="envInfo" class="mono" style="font-size:12px;white-space:pre-wrap">Loading...</div>
</div>
<div class="card">
<h2>Tunnels</h2>
<div class="row">
  <span style="font-weight:600;width:120px">Tailscale</span>
  <span id="tsToggleStatus" class="badge gray">Unknown</span>
  <button id="tsFunnelStart" onclick="tsFunnelToggle('start')">Start</button>
  <button id="tsFunnelStop" class="danger" onclick="tsFunnelToggle('stop')">Stop</button>
</div>
<div class="row" style="margin-top:8px">
  <span style="font-weight:600;width:120px">Cloudflare</span>
  <span id="cfToggleStatus" class="badge gray">Unknown</span>
  <button id="cfFunnelStart" onclick="cfFunnelToggle('start')">Start</button>
  <button id="cfFunnelStop" class="danger" onclick="cfFunnelToggle('stop')">Stop</button>
  <a id="cfUrl" href="#" target="_blank" style="margin-left:8px;font-size:12px;display:none" class="mono"></a>
</div>
</div>
<div class="card">
<h2>Actions</h2>
<div class="row"><button class="danger" onclick="bridgeRestart()">Restart Bridge</button>
<button class="warning" onclick="regenToken()">Regenerate Token</button>
<button class="info" onclick="exportConfig()">Export Config</button></div>
</div>
<div class="card">
<h2>Webhooks</h2>
<div class="row" style="flex-wrap:wrap">
<label style="flex:1;min-width:200px">
  Webhook URLs (one per line):<br>
  <textarea id="setWebhookUrls" style="width:100%;height:60px" placeholder="https://discord.com/api/webhooks/..."></textarea>
</label>
<label style="flex:1;min-width:200px">
  Events (comma separated, * for all):<br>
  <input type="text" id="setWebhookEvents" style="width:100%" placeholder="*, exec_done, task_submit">
</label>
</div>
<button onclick="saveWebhooks()">Save Webhooks</button>
</div>
<div class="card">
<h2>Sound Notifications</h2>
<div class="row">
<button onclick="testBeep('success')">Success</button>
<button onclick="testBeep('warning')">Warning</button>
<button onclick="testBeep('error')">Error</button>
<button onclick="testBeep('melody')">Melody</button>
<button onclick="testBeep('attention')">Attention</button>
</div>
</div>
<div class="card">
<h2>Quick Commands</h2>
<div class="row"><button onclick="apiQuickGet('/v1/sysinfo')">sys info</button></div>
<div class="row"><button onclick="apiQuickGet('/v1/doctor')">sys doctor</button></div>
<div class="row"><button onclick="apiQuickGet('/v1/memory')">mem get all</button></div>
</div>
</div>

</div>
