<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arena Bridge v{{VERSION}}</title>
<link rel="stylesheet" href="/gui/assets/dashboard.css?v={{VERSION}}">
</head>
<body>
<div id="arena-dashboard-root"></div>
<script>
window.ARENA_TOKEN = "{{TOKEN}}";
window.ARENA_VERSION = "{{VERSION}}";
window.ARENA_HOST = "{{HOST}}";
window.ARENA_DASHBOARD_SCRIPTS = [
    '/gui/assets/00-core.js',
    '/gui/assets/01-tab-switching.js',
    '/gui/assets/02-api-helper.js',
    '/gui/assets/03-helpers.js',
    '/gui/assets/04-overview.js',
    '/gui/assets/05-terminal-v1-6-2-persistent-shell-like-se.js',
    '/gui/assets/06-memory.js',
    '/gui/assets/07-recall.js',
    '/gui/assets/08-missions.js',
    '/gui/assets/09-browser-search.js',
    '/gui/assets/09b-browser-read-dump.js',
    '/gui/assets/09c-browser-fetch-head.js',
    '/gui/assets/09d-browser-screenshot.js',
    '/gui/assets/10-reports.js',
    '/gui/assets/11-tasks.js',
    '/gui/assets/12-skills.js',
    '/gui/assets/13-hooks.js',
    '/gui/assets/14-agents.js',
    '/gui/assets/15-doctor-run.js',
    '/gui/assets/15b-doctor-fix.js',
    '/gui/assets/16-audit.js',
    '/gui/assets/17-settings-status.js',
    '/gui/assets/17b-settings-token-export.js',
    '/gui/assets/17c-settings-restart.js',
    '/gui/assets/18-keyboard-shortcuts.js',
    '/gui/assets/19-auto-refresh.js',
    '/gui/assets/20-section.js',
    '/gui/assets/21-slash-commands.js',
    '/gui/assets/21b-hwinfo-overview-extensions.js',
    '/gui/assets/22-full-inventory-loader.js',
    '/gui/assets/22b-full-inventory-format.js',
    '/gui/assets/23-control-panel-v2-9-0.js',
    '/gui/assets/24-workspace.js',
    '/gui/assets/25-workspace-v2.js',
    '/gui/assets/26-workspace-v3.js',
    '/gui/assets/29-tunnels.js'
];
(async function bootArenaDashboard() {
  const root = document.getElementById("arena-dashboard-root");
  const bodyParts = [
    '/gui/assets/body-00-shell.html',
    '/gui/assets/body-01-overview.html',
    '/gui/assets/body-01b-workspace.html',
    '/gui/assets/body-02-terminal.html',
    '/gui/assets/body-03-memory.html',
    '/gui/assets/body-04-recall.html',
    '/gui/assets/body-05-missions.html',
    '/gui/assets/body-06-browser.html',
    '/gui/assets/body-07-reports.html',
    '/gui/assets/body-08-tasks.html',
    '/gui/assets/body-09-skills.html',
    '/gui/assets/body-10-hooks.html',
    '/gui/assets/body-11-agents.html',
    '/gui/assets/body-12-doctor.html',
    '/gui/assets/body-13-audit.html',
    '/gui/assets/body-14-control.html',
    '/gui/assets/body-15-settings.html'
  ];
  const cacheBust = "?v=" + encodeURIComponent(window.ARENA_VERSION || "dev");
  const bodyHtml = await Promise.all(bodyParts.map(async p => (await fetch(p + cacheBust, {cache: "no-store"})).text()));
  const placeholders = {
    token: "{{" + "TOKEN" + "}}",
    version: "{{" + "VERSION" + "}}",
    host: "{{" + "HOST" + "}}",
  };
  const renderedBody = bodyHtml.join("")
    .replaceAll(placeholders.token, window.ARENA_TOKEN || "")
    .replaceAll(placeholders.version, window.ARENA_VERSION || "")
    .replaceAll(placeholders.host, window.ARENA_HOST || "");
  const tpl = document.createElement("template");
  tpl.innerHTML = renderedBody;
  root.replaceWith(tpl.content.cloneNode(true));
  for (const src of window.ARENA_DASHBOARD_SCRIPTS) {
    await new Promise((resolve, reject) => {
      const s = document.createElement("script");
      s.src = src + cacheBust;
      s.onload = resolve;
      s.onerror = () => reject(new Error("Failed to load " + src));
      document.body.appendChild(s);
    });
  }
})().catch(err => {
  document.body.innerHTML = "<pre style='color:#e94560;padding:2rem'>Dashboard boot failed: " + String(err) + "</pre>";
});
</script>
</body>
</html>
