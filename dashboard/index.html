<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0f0f23">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Arena Bridge v{{VERSION}}</title>
<link rel="stylesheet" href="/gui/assets/dashboard.css?v={{VERSION}}">
<link rel="stylesheet" href="/gui/assets/responsive.css?v={{VERSION}}">
</head>
<body>
<div id="arena-dashboard-root"></div>
<script>
window.ARENA_TOKEN = "{{TOKEN}}";
window.ARENA_VERSION = "{{VERSION}}";
window.ARENA_HOST = "{{HOST}}";
(async function bootArenaDashboard() {
  const root = document.getElementById("arena-dashboard-root");
  const cacheBust = "?v=" + encodeURIComponent(window.ARENA_VERSION || "dev");

  // v3.91.0: script + body lists come from the server manifest
  // (auto-generated from the assets directory) instead of being
  // hardcoded here.
  //
  // v4.48.7: two hardening fixes for repeated-reload boot failures
  // reported live ("Dashboard boot failed: asset manifest empty and
  // no fallback list configured."):
  //   1. Retry manifest fetch up to 3x with 250/500 ms backoff --
  //      Chrome intermittently 0-reads a reused connection and the
  //      first fetch resolves !res.ok even though the second call
  //      sails through (same class of bug as script-tag onerror
  //      that already had its own retry).
  //   2. Ship a *sync* minimal fallback (just body-00-shell.html +
  //      the two entry scripts needed for the tab registry) so
  //      even if the manifest endpoint is genuinely down the shell
  //      renders and the user sees a real error next to a real
  //      sidebar instead of a bare <pre>.
  async function fetchManifest() {
    const attempts = 3;
    let lastErr = null;
    for (let i = 1; i <= attempts; i++) {
      try {
        const res = await fetch("/gui/assets/manifest.json" + cacheBust,
                                {cache: "no-store"});
        if (res.ok) {
          const data = await res.json();
          if (Array.isArray(data.scripts) && data.scripts.length) return data;
          lastErr = new Error("manifest ok but scripts=[]");
        } else {
          lastErr = new Error("manifest HTTP " + res.status);
        }
      } catch (e) { lastErr = e; }
      if (i < attempts) {
        await new Promise(r => setTimeout(r, 250 * i));
      }
    }
    console.warn("[arena] manifest fetch failed after " + attempts +
                 " tries: " + (lastErr && lastErr.message));
    return null;
  }
  const manifest = await fetchManifest();

  // Synchronous last-resort fallback: enough to render the shell
  // + tab registry + api helpers. Ships as a *string list* so it
  // works even when /gui/assets/manifest.json 500s. Deliberately
  // narrow -- the goal is "user sees the sidebar and a real error
  // message", not "every tab works offline". Full functionality
  // still requires the manifest.
  const SYNC_FALLBACK_SCRIPTS = [
    "/gui/assets/00-core.js",
    "/gui/assets/00-tabs-registry.js",
    "/gui/assets/01-tab-switching.js",
    "/gui/assets/02-api-helper.js",
    "/gui/assets/03-helpers.js",
  ];
  const SYNC_FALLBACK_BODIES = [
    "/gui/assets/body-00-shell.html",
  ];

  const scripts = (manifest && Array.isArray(manifest.scripts) && manifest.scripts.length)
    ? manifest.scripts
    : (Array.isArray(window.ARENA_FALLBACK_SCRIPTS) && window.ARENA_FALLBACK_SCRIPTS.length
        ? window.ARENA_FALLBACK_SCRIPTS
        : SYNC_FALLBACK_SCRIPTS);
  const bodyParts = (manifest && Array.isArray(manifest.bodies) && manifest.bodies.length)
    ? manifest.bodies
    : (Array.isArray(window.ARENA_FALLBACK_BODIES) && window.ARENA_FALLBACK_BODIES.length
        ? window.ARENA_FALLBACK_BODIES
        : SYNC_FALLBACK_BODIES);

  if (!scripts.length) {
    document.body.innerHTML =
      "<pre style='color:#e94560;padding:2rem'>Dashboard boot failed: "
      + "asset manifest empty and no fallback list configured.</pre>";
    return;
  }

  // Warn the user when we're running on the sync-fallback list --
  // most tabs will be missing and they should know why.
  const usingFallback = !(manifest && manifest.scripts && manifest.scripts.length);
  if (usingFallback) {
    console.warn("[arena] booting from sync fallback -- most tabs unavailable");
  }

  const bodyHtml = await Promise.all(bodyParts.map(async p =>
    (await fetch(p + cacheBust, {cache: "no-store"})).text()));
  const placeholders = {
    token: "{{" + "TOKEN" + "}}",
    version: "{{" + "VERSION" + "}}",
    host: "{{" + "HOST" + "}}",
  };
  const renderedBody = bodyHtml.join("")
    .replaceAll(placeholders.token, window.ARENA_TOKEN || "")
    .replaceAll(placeholders.version, window.ARENA_VERSION || "")
    .replaceAll(placeholders.host, window.ARENA_HOST || "");
  const tpl = document.createElement("template");
  tpl.innerHTML = renderedBody;
  root.replaceWith(tpl.content.cloneNode(true));

  // Expose the effective list for debugging / tests.
  window.ARENA_DASHBOARD_SCRIPTS = scripts;
  window.ARENA_DASHBOARD_USING_FALLBACK = usingFallback;

  for (const src of scripts) {
    // v3.85.3: retry twice on transient load failure. Chrome
    // occasionally 0-reads the response body on connection reuse and
    // fires script.onerror even though the second attempt sails
    // through -- which is why the Dashboard used to fail-fast with
    // "Failed to load /gui/assets/00-core.js" on random reloads.
    let lastErr = null;
    let loaded = false;
    for (let attempt = 1; attempt <= 3 && !loaded; attempt++) {
      try {
        await new Promise((resolve, reject) => {
          const s = document.createElement("script");
          s.src = src + cacheBust + "&try=" + attempt;
          s.onload = () => { loaded = true; resolve(); };
          s.onerror = () => reject(new Error("Failed to load " + src));
          document.body.appendChild(s);
        });
      } catch (e) {
        lastErr = e;
        if (attempt < 3) {
          await new Promise(r => setTimeout(r, 250 * attempt));
        }
      }
    }
    if (!loaded) throw lastErr;
  }

  if (usingFallback) {
    // Surface a subtle warning banner once the shell is up so the
    // user knows to check the manifest endpoint.
    const warn = document.createElement("div");
    warn.style.cssText = "position:fixed;top:0;left:0;right:0;z-index:99999;"
      + "background:#ff9800;color:#000;padding:6px 12px;font-size:12px;"
      + "font-family:system-ui,sans-serif;text-align:center";
    warn.textContent = "Dashboard booted in fallback mode -- /gui/assets/manifest.json unreachable. "
      + "Only the shell is loaded; reload to retry.";
    document.body.appendChild(warn);
  }
})().catch(err => {
  document.body.innerHTML = "<pre style='color:#e94560;padding:2rem'>Dashboard boot failed: " + String(err) + "</pre>";
});
</script>
</body>
</html>
