<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0f0f23">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Arena Bridge v{{VERSION}}</title>
<link rel="stylesheet" href="/gui/assets/dashboard.css?v={{VERSION}}">
<link rel="stylesheet" href="/gui/assets/responsive.css?v={{VERSION}}">
</head>
<body>
<div id="arena-dashboard-root"></div>
<script>
window.ARENA_TOKEN = "{{TOKEN}}";
window.ARENA_VERSION = "{{VERSION}}";
window.ARENA_HOST = "{{HOST}}";
(async function bootArenaDashboard() {
  const root = document.getElementById("arena-dashboard-root");
  const cacheBust = "?v=" + encodeURIComponent(window.ARENA_VERSION || "dev");

  // v3.91.0: script + body lists come from the server manifest
  // (auto-generated from the assets directory) instead of being
  // hardcoded here. Falls back to the legacy hardcoded pair only
  // if the manifest endpoint is unreachable so a partially-upgraded
  // bridge still boots.
  let manifest = null;
  try {
    const res = await fetch("/gui/assets/manifest.json" + cacheBust,
                            {cache: "no-store"});
    if (res.ok) manifest = await res.json();
  } catch (_e) { /* fall through to fallback */ }

  const scripts = (manifest && Array.isArray(manifest.scripts))
    ? manifest.scripts
    : (window.ARENA_FALLBACK_SCRIPTS || []);
  const bodyParts = (manifest && Array.isArray(manifest.bodies))
    ? manifest.bodies
    : (window.ARENA_FALLBACK_BODIES || ['/gui/assets/body-00-shell.html']);

  if (!scripts.length) {
    document.body.innerHTML =
      "<pre style='color:#e94560;padding:2rem'>Dashboard boot failed: "
      + "asset manifest empty and no fallback list configured.</pre>";
    return;
  }

  const bodyHtml = await Promise.all(bodyParts.map(async p =>
    (await fetch(p + cacheBust, {cache: "no-store"})).text()));
  const placeholders = {
    token: "{{" + "TOKEN" + "}}",
    version: "{{" + "VERSION" + "}}",
    host: "{{" + "HOST" + "}}",
  };
  const renderedBody = bodyHtml.join("")
    .replaceAll(placeholders.token, window.ARENA_TOKEN || "")
    .replaceAll(placeholders.version, window.ARENA_VERSION || "")
    .replaceAll(placeholders.host, window.ARENA_HOST || "");
  const tpl = document.createElement("template");
  tpl.innerHTML = renderedBody;
  root.replaceWith(tpl.content.cloneNode(true));

  // Expose the effective list for debugging / tests.
  window.ARENA_DASHBOARD_SCRIPTS = scripts;

  for (const src of scripts) {
    // v3.85.3: retry twice on transient load failure. Chrome
    // occasionally 0-reads the response body on connection reuse and
    // fires script.onerror even though the second attempt sails
    // through -- which is why the Dashboard used to fail-fast with
    // "Failed to load /gui/assets/00-core.js" on random reloads.
    let lastErr = null;
    let loaded = false;
    for (let attempt = 1; attempt <= 3 && !loaded; attempt++) {
      try {
        await new Promise((resolve, reject) => {
          const s = document.createElement("script");
          s.src = src + cacheBust + "&try=" + attempt;
          s.onload = () => { loaded = true; resolve(); };
          s.onerror = () => reject(new Error("Failed to load " + src));
          document.body.appendChild(s);
        });
      } catch (e) {
        lastErr = e;
        if (attempt < 3) {
          await new Promise(r => setTimeout(r, 250 * attempt));
        }
      }
    }
    if (!loaded) throw lastErr;
  }
})().catch(err => {
  document.body.innerHTML = "<pre style='color:#e94560;padding:2rem'>Dashboard boot failed: " + String(err) + "</pre>";
});
</script>
</body>
</html>
